name: Bug Report
description: Report a bug in Endgame
labels: [bug]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the bug.
      placeholder: |
        ```python
        import endgame as eg
        # ...
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen instead.
    validations:
      required: true

  - type: textarea
    id: traceback
    attributes:
      label: Traceback
      description: Full error traceback, if applicable.
      render: python

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Version and platform details.
      placeholder: |
        - Endgame version:
        - Python version:
        - OS:
        - Relevant optional dependencies (e.g., xgboost, torch):
    validations:
      required: true
